name: Analisador Diário de Músicas

on:
  schedule:
    # Roda todos os dias às 12:00 UTC (09:00 no Horário de Brasília)
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite o botão de início manual

jobs:
  analisar_dados:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Rodar script de análise
        run: python analisador.py

      - name: Salvar alterações no GitHub (Git Puro)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Mapeia todas as pastas e arquivos novos/modificados
          git add historico_dados/ historico_relatorios/ relatorio_diario.md dados_dashboard.json || true
          
          if ! git diff --cached --quiet; then
            git commit -m "📊 Histórico, relatórios e dados do painel atualizados"
            git pull origin main --rebase
            git push origin main
          else
            echo "Nenhuma mudança nos dados estruturados detectada hoje."
          fi
