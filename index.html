<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Evolução Musical</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #d8df00;
            --text-main: #1a1a1a;
            --text-muted: #666;
            --bg-body: #f4f4f4;
            --white: #ffffff;
            --border-light: #e0e0e0;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            font-size: 11px;
            background-color: var(--bg-body);
            margin: 0;
            padding: 30px;
            color: var(--text-main);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        header h1 { font-size: 22px; margin: 0 0 5px 0; font-weight: 700; }
        p.subtitle { font-size: 11px; color: var(--text-muted); margin: 0 0 20px 0; }

        /* BOX DO GRÁFICO FIXO NO TOPO DO PAINEL */
        .chart-box {
            border: 1px solid var(--border-light);
            border-radius: 6px;
            background-color: #fdfdfd;
            padding: 15px;
            margin-bottom: 30px;
            height: 260px;
            position: relative;
        }
        .no-data { text-align: center; color: var(--text-muted); font-style: italic; pt: 100px; padding-top: 100px; }

        /* SELEÇÃO E BUSCA SECUNDÁRIA */
        .search-container { margin-bottom: 25px; display: flex; gap: 10px; align-items: center; }
        .search-input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; font-family: inherit; width: 250px; }
        .search-input:focus { border-color: #999; outline: none; }

        /* SEÇÕES DO RELATÓRIO */
        .report-section { margin-top: 25px; display: none; }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px; margin: 0; border-radius: 4px 4px 0 0; }
        
        /* CORES DAS SEÇÕES BASEADAS NO SEU EM ALTA */
        .title-absurda { background-color: #fadbd8; color: #c0392b; border: 1px solid #f5b7b1; }
        .title-grandes { background-color: #f3e5f5; color: #7b1fa2; border: 1px solid #e1bee7; }
        .title-moderadas { background-color: #e3f2fd; color: #1976d2; border: 1px solid #bbdefb; }
        .title-pequenas { background-color: #f0f0f0; color: #555; border: 1px solid #e0e0e0; }
        .title-novas { background-color: #eafaf1; color: #27ae60; border: 1px solid #d4efdf; }

        /* ESTILIZAÇÃO DAS TABELAS PLANILHA */
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; border: 1px solid var(--border-light); border-top: none; }
        th { color: #888; font-weight: 600; text-transform: uppercase; font-size: 9px; letter-spacing: 0.5px; padding: 10px; border-bottom: 1px solid var(--border-light); background: #fafafa; }
        td { padding: 9px 10px; border-bottom: 1px solid var(--border-light); text-align: left; }
        
        /* ITENS INTERATIVOS CLICÁVEIS */
        .clickable-row { cursor: pointer; transition: background 0.15s; }
        .clickable-row:hover { background-color: #fcfde7 !important; } /* Realce sutil usando o seu amarelo */
        .clickable-row.active-track { background-color: #f9fbc5; font-weight: 600; }

        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .badge-pos { background: #1a1a1a; color: #fff; padding: 2px 5px; border-radius: 3px; font-weight: 600; font-size: 10px; }
        .badge-subida { font-weight: 700; color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="report-date">Relatório Diário de Evolução</h1>
        <p class="subtitle">Clique sobre qualquer faixa das tabelas abaixo para carregar o gráfico histórico de performance.</p>
    </header>

    <div class="chart-box">
        <canvas id="historicoChart" style="display:none;"></canvas>
        <div id="msg-inicial" class="no-data">📊 Selecione uma música nas listagens abaixo para analisar o histórico de posições.</div>
    </div>

    <div class="search-container">
        <span style="font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 9px;">Busca Direta:</span>
        <input type="text" id="musica-input" class="search-input" list="musicas-list" placeholder="Procurar outra faixa do histórico...">
        <datalist id="musicas-list"></datalist>
    </div>

    <div id="report-tables-wrapper"></div>
</div>

<script>
    let dadosGlobais = null;
    let chartInstance = null;

    // Carrega o banco consolidado do repositório
    fetch('dados_dashboard.json')
        .then(response => response.json())
        .then(data => {
            dadosGlobais = data;
            
            // Popula busca manual
            const datalist = document.getElementById('musicas-list');
            Object.keys(data.musicas).sort().forEach(m => {
                let opt = document.createElement('option');
                opt.value = m;
                datalist.appendChild(opt);
            });

            // Constrói o relatório interativo na tela
            processarEMontarRelatorio();
        })
        .catch(err => {
            console.error(err);
            document.getElementById('msg-inicial').innerText = "Erro ao carregar dados. Certifique-se de que a automação rodou com sucesso.";
        });

    function processarEMontarRelatorio() {
        const datas = dadosGlobais.datas;
        if(datas.length === 0) return;

        const hoje = datas[datas.length - 1];
        const ontem = datas.length > 1 ? datas[datas.length - 2] : null;

        // Atualiza cabeçalho com data corrente
        document.getElementById('report-date').innerText = `Relatório Diário — ${hoje.split('-').reverse().join('/')}`;

        let absurdas = [], grandes = [], moderadas = [], pequenas = [], novas = [];

        // Varre e classifica dinamicamente as movimentações do dia
        Object.entries(dadosGlobais.musicas).forEach(([nomeChave, historico]) => {
            if (!historico[hoje]) return; // Não está no top hoje

            let posAtual = historico[hoje];
            let detalhe = { nome: nomeChave, atual: posAtual };

            if (!ontem || !historico[ontem]) {
                novas.push(detalhe);
            } else {
                let posAnterior = historico[ontem];
                let ganho = posAnterior - posAtual; // Positivo significa que subiu de posição
                detalhe.ganho = ganho;
                detalhe.anterior = posAnterior;

                if (ganho > 400) absurdas.push(detalhe);
                else if (ganho > 200) grandes.push(detalhe);
                else if (ganho >= 100) moderadas.push(detalhe);
                else if (ganho > 2) pequenas.push(detalhe);
            }
        });

        // Ordenações internas por maior impacto
        const ordenar = (arr) => arr.sort((a,b) => (b.ganho || 0) - (a.ganho || 0));
        ordenar(absurdas); ordenar(grandes); ordenar(moderadas); ordenar(pequenas);
        novas.sort((a,b) => a.atual - b.atual);

        // Montagem das estruturas de tabela HTML
        let wrapper = document.getElementById('report-tables-wrapper');
        wrapper.innerHTML = '';

        wrapper.appendChild(criarTabelaHTML("🚨 Explosão no Top (+400 posições)", absurdas, "absurda", true));
        wrapper.appendChild(criarTabelaHTML("🔥 Grandes Saltos (+200 a 400 posições)", grandes, "grandes", true));
        wrapper.appendChild(criarTabelaHTML("📈 Subidas Significativas (100 a 200 posições)", moderadas, "moderadas", true));
        wrapper.appendChild(criarTabelaHTML("🌱 Pequenas Subidas (Abaixo de 100 posições)", pequenas, "pequenas", true));
        wrapper.appendChild(criarTabelaHTML("🚀 Novas Entradas no Top", novas, "novas", false));
    }

    function criarTabelaHTML(titulo, dados, classeEstilo, exibirGanho) {
        let section = document.createElement('div');
        section.className = "report-section";
        section.style.display = dados.length > 0 ? "block" : "none";

        let html = `<h2 class="section-title title-${classeEstilo}">${titulo}</h2>`;
        html += `<table>
            <thead>
                <tr>
                    <th style="width: 80px;" class="text-center">Posição</th>
                    <th>Nome da Faixa / Artista</th>
                    ${exibirGanho ? `<th style="width: 120px;" class="text-center">Posição Anterior</th>` : ''}
                    ${exibirGanho ? `<th style="width: 120px;" class="text-center">Evolução</th>` : ''}
                </tr>
            </thead>
            <tbody>`;

        dados.forEach(item => {
            html += `
            <tr class="clickable-row" onclick="selecionarFaixa('${item.nome.replace(/'/g, "\\'")}', this)">
                <td class="text-center"><span class="badge-pos">${item.atual}º</span></td>
                <td style="font-weight: 500;">${item.nome}</td>
                ${exibirGanho ? `<td class="text-center" style="color: #666;">${item.anterior}º</td>` : ''}
                ${exibirGanho ? `<td class="text-center badge-subida">🔼 +${item.ganho}</td>` : ''}
            </tr>`;
        });

        html += `</tbody></table>`;
        section.innerHTML = html;
        return section;
    }

    // Gerenciador de cliques nas linhas das tabelas ou caixa de busca
    function selecionarFaixa(nomeMusica, elementoLinha) {
        // Remove destaque de qualquer outra linha anterior
        document.querySelectorAll('.clickable-row').forEach(el => el.classList.remove('active-track'));
        if(elementoLinha) elementoLinha.classList.add('active-track');

        document.getElementById('msg-inicial').style.display = 'none';
        document.getElementById('historicoChart').style.display = 'block';
        gerarGrafico(nomeMusica);
    }

    // Acoplamento com a caixa de busca manual
    document.getElementById('musica-input').addEventListener('input', function(e) {
        let val = e.target.value;
        if (dadosGlobais && dadosGlobais.musicas[val]) {
            selecionarFaixa(val, null);
        }
    });

    function gerarGrafico(nomeMusica) {
        const datas = dadosGlobais.datas;
        const historicoPosis = dadosGlobais.musicas[nomeMusica];
        const pontos = datas.map(data => historicoPosis[data] || null);

        if (chartInstance) { chartInstance.destroy(); }

        const ctx = document.getElementById('historicoChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: datas.map(d => d.split('-').reverse().join('/')),
                datasets: [{
                    label: `Histórico de Ranking: ${nomeMusica}`,
                    data: pontos,
                    borderColor: '#1a1a1a',
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    pointBackgroundColor: '#d8df00',
                    pointBorderColor: '#1a1a1a',
                    pointBorderWidth: 1.5,
                    pointRadius: 4,
                    spanGaps: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        reverse: true,
                        min: 1,
                        grid: { color: '#e0e0e0' },
                        title: { display: true, text: 'POSIÇÃO', font: { size: 9, weight: 700 } }
                    },
                    x: { grid: { display: false } }
                }
            }
        });
    }
</script>

</body>
</html>
